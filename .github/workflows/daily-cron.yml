name: Daily Aggregation

on:
  schedule:
    - cron: '0 */6 * * *'  # 每 6 小时 (02:00, 08:00, 14:00, 20:00 BJT)
  workflow_dispatch:       # Manual trigger for testing

jobs:
  aggregate:
    runs-on: ubuntu-latest
    services:
      trendradar:
        image: wantcat/trendradar-mcp
        ports:
          - 3333:3333

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - name: Wait for TrendRadar MCP
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:3333 > /dev/null 2>&1; then
              echo "TrendRadar ready"
              break
            fi
            echo "Waiting for TrendRadar... ($i)"
            sleep 2
          done

      - name: Run aggregation
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_AUDIENCE_ID: ${{ secrets.RESEND_AUDIENCE_ID }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
        run: node scripts/aggregate.mjs

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "data: daily aggregation $(date +%Y-%m-%d)"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    needs: aggregate
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
